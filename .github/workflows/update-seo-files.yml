name: Update SEO Files (robots.txt & sitemap.xml)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch: # Allow manual runs

permissions:
  contents: write
  actions: write

jobs:
  update-seo:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Generate robots.txt and sitemap.xml
        run: bun scripts/generate-sitemap.ts
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push to main if files changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/robots.txt public/sitemap.xml
          if git diff --cached --quiet; then
            echo "No changes to SEO files, skipping commit."
          else
            git commit -m "chore: update robots.txt and sitemap.xml"
            git push origin main
          fi

      - name: Trigger deployment workflow
        run: gh workflow run deploy.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
